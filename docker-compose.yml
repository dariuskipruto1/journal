version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: journal_prod
      POSTGRES_USER: journal_user
      POSTGRES_PASSWORD: journal_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journal_user -d journal_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn journal_project.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "False"
      DATABASE_URL: postgresql://journal_user:journal_password@db:5432/journal_prod
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: your-production-secret-key-change-this
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web
      TASK_ALERTS_EMAIL_ENABLED: "False"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  celery:
    build: .
    command: celery -A journal_project worker --loglevel=info
    environment:
      DJANGO_DEBUG: "False"
      DATABASE_URL: postgresql://journal_user:journal_password@db:5432/journal_prod
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: your-production-secret-key-change-this
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  celery-beat:
    build: .
    command: celery -A journal_project beat --loglevel=info
    environment:
      DJANGO_DEBUG: "False"
      DATABASE_URL: postgresql://journal_user:journal_password@db:5432/journal_prod
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: your-production-secret-key-change-this
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  default:
    name: journal_network
