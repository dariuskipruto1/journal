<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'journal/css/style.css' %}">
    <link rel="icon" type="image/svg+xml" href="{% static 'journal/favicon.svg' %}">
</head>
<body>
    <div class="page-container">
        <div class="topbar">
            <h1><i class="fa-solid fa-user-plus icon"></i>Sign Up</h1>
            <a class="button-link" href="{% url 'login' %}"><i class="fa-solid fa-right-to-bracket icon"></i>Login</a>
        </div>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit"><i class="fa-solid fa-user-plus icon"></i>Sign Up</button>
        </form>
        <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
</body>
</html>
